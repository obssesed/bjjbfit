<div class="header-section">
  <h1 class="title">Sesiones Disponibles</h1>
  <p class="subtitle">Asegura tu lugar en el tatami.</p>
</div>

<div *ngIf="mensajeExito" class="alert-success">
  <span class="icon">✓</span> {{ mensajeExito }}
</div>

<div *ngIf="cargando" class="loading-state">
  <div class="loader"></div>
</div>

<div *ngIf="error" class="alert-error">
  <p>{{ error }}</p>
</div>

<div class="week-calendar" *ngIf="!cargando && !error">
  
  <div *ngFor="let dia of semana" class="day-column" [class.is-today]="dia.esHoy">
    <div class="day-header">
      <span class="day-name">{{ dia.nombre }}</span>
      <span class="day-number" [class.highlight-gold]="dia.esHoy">{{ dia.numero }}</span>
    </div>

    <div class="classes-list">
      <div *ngIf="dia.clases.length === 0" class="empty-day">
        <span>No programado</span>
      </div>

      <div *ngFor="let clase of dia.clases" class="mini-card" 
           [class.full-card]="clase.plazas_disponibles <= 0 && !esClasePasada(clase.fecha_hora_inicio)"
           [class.past-card]="esClasePasada(clase.fecha_hora_inicio)">
        <div class="mini-card-content">
          <div class="time-badge">
            {{ obtenerFormatoHorario(clase.fecha_hora_inicio) }}
          </div>
          <h4 class="mini-title">{{ clase.titulo }}</h4>
        </div>
        
        <div class="mini-card-actions">
          <button class="reserve-btn-sm" 
                  [disabled]="clase.plazas_disponibles <= 0 || esClasePasada(clase.fecha_hora_inicio)" 
                  (click)="reservar(clase)">
            {{ esClasePasada(clase.fecha_hora_inicio) ? 'Caducada' : (clase.plazas_disponibles > 0 ? 'Reservar' : 'Lleno') }}
          </button>
          <span class="spots-left" *ngIf="clase.plazas_disponibles > 0 && clase.plazas_disponibles <= 5 && !esClasePasada(clase.fecha_hora_inicio)">
            ¡Solo {{ clase.plazas_disponibles }}!
          </span>
        </div>
      </div>
    </div>
  </div>

</div>
