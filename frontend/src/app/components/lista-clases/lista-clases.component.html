<div class="clases-header">
  <h1>Próximas Sesiones de BJJ</h1>
  <p class="subtitle">Reserva tu plaza antes de que se agoten.</p>
</div>

<div *ngIf="mensajeExito" class="success-banner">
  {{ mensajeExito }}
</div>

<div *ngIf="cargando" class="loading-state">
  <div class="spinner"></div>
</div>

<div *ngIf="error" class="error-state glass-card">
  <h3>Ups...</h3>
  <p>{{ error }}</p>
</div>

<div class="clases-grid" *ngIf="!cargando && !error">
  
  <div *ngIf="clases.length === 0" class="empty-state glass-card">
    <p>Aún no hay clases programadas en el sistema.</p>
  </div>

  <!-- Bucle sobre las clases obtenidas de la API de Django -->
  <div *ngFor="let clase of clases" class="clase-card glass-card">
    <div class="clase-info">
      <h3>{{ clase.titulo }}</h3>
      <p class="fecha-txt">🗓️ {{ clase.fecha_hora_inicio | date:'EEEE, dd MMM - HH:mm' }}</p>
    </div>
    
    <div class="clase-action">
      <div class="plazas-badge">
        <span class="plazas-num">{{ clase.plazas_disponibles }}</span> libres
      </div>
      <button class="btn-primary" [disabled]="clase.plazas_disponibles <= 0" (click)="reservar(clase)">
        {{ clase.plazas_disponibles > 0 ? 'Reservar' : 'Lleno' }}
      </button>
    </div>
  </div>

</div>
