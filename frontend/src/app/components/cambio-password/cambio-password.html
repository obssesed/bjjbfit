<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon-glow">
        <span>🔒</span>
      </div>
      <h2 class="auth-title">Seguridad Requerida</h2>
      <p class="auth-subtitle">Estás accediendo con una contraseña temporal. Por tu seguridad, debes crear una nueva contraseña definitiva.</p>
    </div>

    <!-- Mensaje de Error -->
    <div *ngIf="errorMsg" class="alert-error">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="cambiarPassword()" class="auth-form">
      <div class="input-group">
        <label for="newPassword">Nueva Contraseña</label>
        <input 
          id="newPassword"
          type="password" 
          [(ngModel)]="newPassword" 
          name="newPassword" 
          placeholder="Mínimo 6 caracteres"
          required>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          id="confirmPassword"
          type="password" 
          [(ngModel)]="confirmPassword" 
          name="confirmPassword" 
          placeholder="Mínimo 6 caracteres"
          required>
      </div>

      <button type="submit" class="submit-btn" [disabled]="cargando || !newPassword || !confirmPassword">
        {{ cargando ? 'Actualizando...' : 'Guardar y Acceder' }}
      </button>
    </form>
  </div>
</div>
