<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="auth-title">Crear nueva cuenta</h2>
      <p class="auth-subtitle">Únete a Bjjfit y asegura tu plaza en el tatami.</p>
    </div>

    <!-- Mensajes de Error -->
    <div *ngIf="errorMsg" class="alert-error">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="registrar()" class="auth-form" #registroForm="ngForm">
      
      <div class="input-group">
        <label for="username">Nombre de usuario *</label>
        <input 
          id="username"
          type="text" 
          [(ngModel)]="registroData.username" 
          name="username" 
          placeholder="Ej: victor_bjj"
          required>
      </div>

      <div class="input-group">
        <label for="email">Correo electrónico *</label>
        <input 
          id="email"
          type="email" 
          [(ngModel)]="registroData.email" 
          name="email" 
          placeholder="tu@email.com"
          required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña *</label>
        <input 
          id="password"
          type="password" 
          [(ngModel)]="registroData.password" 
          name="password" 
          placeholder="Mínimo 8 caracteres"
          required>
      </div>

      <div class="input-group">
        <label for="telefono">Teléfono de contacto</label>
        <input 
          id="telefono"
          type="tel" 
          [(ngModel)]="registroData.telefono" 
          name="telefono" 
          placeholder="Para avisos del gimnasio">
      </div>

      <button type="submit" class="submit-btn" [disabled]="!registroForm.form.valid || cargando">
        {{ cargando ? 'Registrando...' : 'Completar Registro' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login" class="link-gold">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
